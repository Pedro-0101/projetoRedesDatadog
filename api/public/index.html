<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Datadog Network Testing Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dd: { purple: '#632ca6', green: '#1db954', red: '#e74c3c', yellow: '#f39c12', blue: '#3498db' }
          },
          animation: {
            'pulse-fast': 'pulse 0.8s cubic-bezier(0.4,0,0.6,1) infinite',
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0a0a0f; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    .scenario-card { transition: border-color 0.15s, background 0.15s; }
    .scenario-card.active { border-color: #632ca6; background: #1a1025; }
    input[type=range] { height: 4px; cursor: pointer; }
    input[type=range]::-webkit-slider-runnable-track { height: 4px; border-radius: 2px; background: #2a2a3a; }
    input[type=number] { -moz-appearance: textfield; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    .log-entry { animation: fadeIn 0.15s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    .stat-value { font-variant-numeric: tabular-nums; }
    #progress-bar { transition: width 0.3s ease; }
  </style>
</head>
<body class="text-gray-100 min-h-screen font-mono text-sm">

  <!-- Header -->
  <header class="border-b border-gray-800 px-6 py-3 flex items-center gap-3 bg-black/40 backdrop-blur sticky top-0 z-10">
    <div class="flex items-center gap-2">
      <div class="w-2.5 h-2.5 rounded-full bg-dd-purple"></div>
      <div class="w-2.5 h-2.5 rounded-full bg-dd-blue"></div>
      <div class="w-2.5 h-2.5 rounded-full bg-dd-green"></div>
    </div>
    <h1 class="text-sm font-bold tracking-widest text-gray-200 uppercase">Datadog Network Testing Dashboard</h1>
    <div class="ml-auto flex items-center gap-2 text-xs text-gray-500">
      <span id="status-dot" class="w-2 h-2 rounded-full bg-gray-700 inline-block"></span>
      <span id="status-text">Idle</span>
    </div>
  </header>

  <!-- Layout: Left + Right -->
  <div class="flex" style="height: calc(100vh - 49px);">

    <!-- LEFT: Controls -->
    <aside class="w-80 border-r border-gray-800 overflow-y-auto flex flex-col bg-black/20">

      <!-- Scenario Cards -->
      <div class="p-4 border-b border-gray-800">
        <div class="text-xs font-bold text-gray-600 uppercase tracking-widest mb-3">Cenarios Rapidos</div>
        <div id="scenario-cards" class="flex flex-col gap-2">
          <div class="text-xs text-gray-700 animate-pulse">Carregando cenarios...</div>
        </div>
      </div>

      <!-- Custom Config -->
      <div class="p-4 flex-1 flex flex-col gap-4">
        <div class="text-xs font-bold text-gray-600 uppercase tracking-widest">Configuracao Custom</div>

        <div class="flex flex-col gap-1.5">
          <div class="flex justify-between text-xs text-gray-500">
            <span>Requisicoes</span>
            <span id="val-count" class="text-gray-300 font-bold">100</span>
          </div>
          <input type="range" id="inp-count" min="1" max="1000" value="100"
            class="w-full accent-purple-600" />
          <div class="flex justify-between text-xs text-gray-700">
            <span>1</span><span>500</span><span>1000</span>
          </div>
        </div>

        <div class="flex flex-col gap-1.5">
          <div class="flex justify-between text-xs text-gray-500">
            <span>Taxa de Erro</span>
            <span id="val-error" class="text-red-400 font-bold">10%</span>
          </div>
          <input type="range" id="inp-error" min="0" max="100" value="10"
            class="w-full accent-red-600" />
          <div class="flex justify-between text-xs text-gray-700">
            <span>0%</span><span>50%</span><span>100%</span>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div class="flex flex-col gap-1">
            <label class="text-xs text-gray-500">Delay Min (ms)</label>
            <input type="number" id="inp-min-delay" value="100" min="0" max="30000"
              class="bg-gray-900 border border-gray-700 rounded px-2 py-1.5 text-xs w-full text-gray-200 focus:border-purple-600 focus:outline-none" />
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-xs text-gray-500">Delay Max (ms)</label>
            <input type="number" id="inp-max-delay" value="1000" min="0" max="30000"
              class="bg-gray-900 border border-gray-700 rounded px-2 py-1.5 text-xs w-full text-gray-200 focus:border-purple-600 focus:outline-none" />
          </div>
        </div>

        <div class="flex flex-col gap-1.5">
          <div class="flex justify-between text-xs text-gray-500">
            <span>Concorrencia</span>
            <span id="val-concurrency" class="text-blue-400 font-bold">10</span>
          </div>
          <input type="range" id="inp-concurrency" min="1" max="100" value="10"
            class="w-full accent-blue-600" />
          <div class="flex justify-between text-xs text-gray-700">
            <span>1</span><span>50</span><span>100</span>
          </div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="p-4 border-t border-gray-800 flex flex-col gap-2">
        <button id="btn-run"
          class="w-full bg-dd-purple hover:bg-purple-700 disabled:opacity-40 disabled:cursor-not-allowed text-white font-bold py-2.5 px-4 rounded tracking-widest text-xs uppercase transition-colors">
          ▶ Executar Teste
        </button>
        <button id="btn-stop" disabled
          class="w-full bg-gray-800 hover:bg-red-900 disabled:opacity-40 disabled:cursor-not-allowed text-gray-400 hover:text-white font-bold py-2 px-4 rounded tracking-widest text-xs uppercase transition-colors">
          ■ Parar
        </button>
      </div>
    </aside>

    <!-- RIGHT: Monitor -->
    <div class="flex-1 flex flex-col overflow-hidden">

      <!-- Stats Row -->
      <div class="border-b border-gray-800 p-4 bg-black/10">
        <div class="grid grid-cols-6 gap-3">
          <div class="bg-gray-900/60 rounded-lg p-3 border border-gray-800">
            <div class="text-xs text-gray-600 mb-1 uppercase tracking-wider">Enviadas</div>
            <div id="stat-sent" class="stat-value text-xl font-bold text-gray-200">0</div>
          </div>
          <div class="bg-gray-900/60 rounded-lg p-3 border border-gray-800">
            <div class="text-xs text-gray-600 mb-1 uppercase tracking-wider">Sucesso</div>
            <div id="stat-success" class="stat-value text-xl font-bold text-green-400">0</div>
          </div>
          <div class="bg-gray-900/60 rounded-lg p-3 border border-gray-800">
            <div class="text-xs text-gray-600 mb-1 uppercase tracking-wider">Erros</div>
            <div id="stat-errors" class="stat-value text-xl font-bold text-red-400">0</div>
          </div>
          <div class="bg-gray-900/60 rounded-lg p-3 border border-gray-800">
            <div class="text-xs text-gray-600 mb-1 uppercase tracking-wider">Em Voo</div>
            <div id="stat-inflight" class="stat-value text-xl font-bold text-yellow-400">0</div>
          </div>
          <div class="bg-gray-900/60 rounded-lg p-3 border border-gray-800">
            <div class="text-xs text-gray-600 mb-1 uppercase tracking-wider">Taxa OK</div>
            <div id="stat-rate" class="stat-value text-xl font-bold text-gray-400">—</div>
          </div>
          <div class="bg-gray-900/60 rounded-lg p-3 border border-gray-800">
            <div class="text-xs text-gray-600 mb-1 uppercase tracking-wider">Latencia</div>
            <div id="stat-latency" class="stat-value text-xl font-bold text-gray-400">—</div>
          </div>
        </div>
      </div>

      <!-- Progress Bar -->
      <div class="px-4 py-3 border-b border-gray-800 bg-black/10">
        <div class="flex justify-between text-xs text-gray-600 mb-1.5">
          <span id="progress-label">0 / 0</span>
          <span id="progress-pct">0%</span>
        </div>
        <div class="w-full bg-gray-900 rounded-full h-1.5">
          <div id="progress-bar" class="bg-dd-purple h-1.5 rounded-full" style="width:0%"></div>
        </div>
      </div>

      <!-- Live Log -->
      <div class="flex-1 overflow-hidden flex flex-col">
        <div class="px-4 py-2 border-b border-gray-800 flex items-center justify-between bg-black/20">
          <span class="text-xs font-bold text-gray-600 uppercase tracking-widest">Live Log</span>
          <button id="btn-clear" class="text-xs text-gray-700 hover:text-gray-400 transition-colors">Limpar</button>
        </div>
        <div id="log-container" class="flex-1 overflow-y-auto p-3 space-y-0.5">
          <div class="text-xs text-gray-700 italic p-2">Aguardando inicio do teste...</div>
        </div>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
