services:
  datadog-agent:
    image: gcr.io/datadoghq/agent:7
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=us5.datadoghq.com
      - DD_APM_ENABLED=true
      - DD_APM_NON_LOCAL_TRAFFIC=true
      - DD_LOGS_ENABLED=true
      - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=true
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
    ports:
      - "8126:8126"
      - "8125:8125/udp"

  postgres:
    image: postgres:16
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.track=all"
      - "-c"
      - "track_activity_query_size=4096"
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=app_pw
      - POSTGRES_DB=vendas
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data
    labels:
      com.datadoghq.ad.check_names: '["postgres"]'
      com.datadoghq.ad.init_configs: '[{}]'
      com.datadoghq.ad.instances: '[{"dbm": true, "host": "%%host%%", "port": 5432, "username": "datadog", "password": "datadog_pw"}]'
      com.datadoghq.ad.logs: '[{"source": "postgresql", "service": "postgres-vendas"}]'
    depends_on:
      - datadog-agent

  worker-a:
    build: ./worker
    mem_limit: 256m
    restart: unless-stopped
    environment:
      - DD_AGENT_HOST=datadog-agent
      - DD_ENV=dev
      - DD_SERVICE=worker-a
      - DD_VERSION=1.0.0
      - DD_TRACE_SAMPLE_RATE=1
      - DD_APPSEC_ENABLED=true
      - DD_PROFILING_ENABLED=true
    labels:
      com.datadoghq.ad.logs: '[{"source": "go", "service": "worker-a"}]'
    depends_on:
      - datadog-agent

  worker-b:
    build: ./worker
    mem_limit: 256m
    restart: unless-stopped
    environment:
      - DD_AGENT_HOST=datadog-agent
      - DD_ENV=dev
      - DD_SERVICE=worker-b
      - DD_VERSION=1.0.0
      - DD_TRACE_SAMPLE_RATE=1
      - DD_APPSEC_ENABLED=true
      - DD_PROFILING_ENABLED=true
    labels:
      com.datadoghq.ad.logs: '[{"source": "go", "service": "worker-b"}]'
    depends_on:
      - datadog-agent

  worker-c:
    build: ./worker
    mem_limit: 256m
    restart: unless-stopped
    environment:
      - DD_AGENT_HOST=datadog-agent
      - DD_ENV=dev
      - DD_SERVICE=worker-c
      - DD_VERSION=1.0.0
      - DD_TRACE_SAMPLE_RATE=1
      - DD_APPSEC_ENABLED=true
      - DD_PROFILING_ENABLED=true
    labels:
      com.datadoghq.ad.logs: '[{"source": "go", "service": "worker-c"}]'
    depends_on:
      - datadog-agent

  api:
    build: ./api
    environment:
      - DD_AGENT_HOST=datadog-agent
      - DD_ENV=dev
      - DD_SERVICE=api-vendas
      - DD_VERSION=1.0.0
      - SDN_WORKERS=http://worker-a:8080,http://worker-b:8080,http://worker-c:8080
      - WORKER_URL=http://worker-a:8080
      - DD_TRACE_SAMPLE_RATE=1
      - DD_APPSEC_ENABLED=true
      - DD_LOGS_INJECTION=true
      - DD_RUNTIME_METRICS_ENABLED=true
      - DD_PROFILING_ENABLED=true
      - DATABASE_URL=postgres://app:app_pw@postgres:5432/vendas
      - DEMO_VULN_ENDPOINTS=true
      - DD_DASHBOARD_URL=${DD_DASHBOARD_URL:-}
    ports:
      - "3003:3003"
    labels:
      com.datadoghq.ad.logs: '[{"source": "nodejs", "service": "api-vendas"}]'
    depends_on:
      - datadog-agent
      - worker-a
      - worker-b
      - worker-c
      - postgres

volumes:
  pgdata:
